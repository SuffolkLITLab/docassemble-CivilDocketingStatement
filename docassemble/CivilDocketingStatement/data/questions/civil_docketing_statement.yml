id: method of service 
question: |
  Certificate of service
subquestion: |

  All papers filed in the Appeals Court must be sent to all other parties to the case, or their attorney(s), and filed along with a Certificate of Service stating that you completed this step.  This is called "service," and can be done by email or regular mail.  
  
  If the Certificate of Service is not completed, this filing will not be accepted.

  You are required to provide a copy of this Massachusetts Appeals Court Civil Docketing Statement to each attorney or self-represented party in this appeal. 
  
  You should not provide a copy of your Affidavit of Indigency, if any, to anyone except the Appeals Court.  

  **How will you deliver the required copy of the Massachusetts Appeals Court Civil Docketing Statement to the other parties in this appeal?**

field: service_type
dropdown:
  - Email/E-File: email
  - Mail: mail
  - Hand delivery: hand 

