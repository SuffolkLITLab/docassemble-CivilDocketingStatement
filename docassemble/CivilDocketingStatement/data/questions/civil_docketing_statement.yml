id: impoundment_checkbox
question: |
  Impoundment information
subquestion: |
  Impoundment means that a document or part of a court record is kept confidential and not available to the public. The court restricts access to protect sensitive or private information.

  For this form, impounded documents include any part of the record that is impounded, sealed, or confidential by statute, court order, rule, or standing order. 
fields:  
  - Is any part of the record impounded?: record_impounded
    datatype: yesnoradio
      
  - Is the entire case impounded?: fully_impounded
    datatype: yesnoradio 
    show if:
      variable: record_impounded
      is: True
  - note: |
      If the entire case is impounded, type "entire case" below 
    show if: 
      variable: record_impounded
      is: True
  - List the documents that are impounded: impoundment_documents
    datatype: area
    show if: 
      variable: record_impounded
      is: True
