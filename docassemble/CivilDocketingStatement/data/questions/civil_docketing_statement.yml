id: appeal_final_judgment
question: |
  Basis of appeal
subquestion: |
  
  A **final judgment** means the court has finished the case. The judge has ruled on every claim and every party, so nothing is left for the trial court to decide.
fields: 
  - Are you appealing the final decision in the case?: appeal_from_final_judgment
    datatype: yesnoradio
  - note: |
      Enter the date the final judgment was put on the court docket
    datatype: date
    show if: 
      variable: appeal_from_final_judgment
      is: True      
  - Date of final judgment: date_of_judgment
    datatype: date
    show if: 
      variable: appeal_from_final_judgment
      is: True
  - note: |
      That means you are appealing a decision the judge makes during a case before the case is finished. This is called an **interlocutory order**. 

      Enter the date the order you are appealing was put on the docket
    show if: 
      variable: appeal_from_final_judgment
      is: False   
  - Date of judgment: date_of_judgment
    datatype: date
    show if: 
      variable: appeal_from_final_judgment
      is: False
  - note: |      
       In the box below, list the law, statute, court rule, or legal doctrine that allows you to file an appeal before the case is final. 

        Examples: {G.L. c. 231, § 118} or the {doctrine of present execution}. 
    show if: 
      variable: appeal_from_final_judgment
      is: False
  - Basis of appeal (statute/rule/doctrine): interlocutory_appeal
    datatype: area
    show if: 
      variable: appeal_from_final_judgment
      is: False
terms: 
  G.L. c. 231, § 118: |
    G.L. c. 231, § 118 (first paragraph) is a Massachusetts statute that allows a party to seek review of certain interlocutory (non-final) orders issued by a trial court judge.
  doctrine of present execution: |
    The doctrine of present execution is a rule in Massachusetts that allows someone to appeal certain interlocutory orders immediately, even though the case is not finished.
    
