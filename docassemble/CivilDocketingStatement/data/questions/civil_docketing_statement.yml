  - Docket number: related_appeals_docket
    datatype: area
    js show if: |
      val("related_appeals_parties") || val("related_appeals_issues")
  - Describe the related matter or issue: related_appeals_description
    datatype: area
    js show if: |
      val("related_appeals_parties") || val("related_appeals_issues")
